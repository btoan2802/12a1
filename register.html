<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <style>
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; /* ngang */
            align-items: center;     /* dọc */
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            font-family: Arial, sans-serif;
        }
        
        form {
            background: white;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            background: #4facfe;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2f8cff;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

    <form>
        <input type="text" placeholder="Tên đăng nhập">
        <input type="password" placeholder="Mật khẩu">
        <input type="password" placeholder="Nhập lại mật khẩu">
        <a href="index.html">
            <button type="button">Đăng ký</button>
        </a>
    </form>

</body>
</html>
